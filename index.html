<html lang="en">
<head>

  <style>
/* ── CSS Variables ─────────────────────────── */
:root {
  --black:  #050810;
  --white:  #F0F2F8;
  --orange: #FF4D00;
  --green:  #00C97A;
  --yellow: #FFB300;
  --red:    #FF2D2D;
  --grey:   #8A8FA8;
  --border: #1C2240;
  --card:   #0C1020;
  --font-header: 'Bebas Neue', sans-serif;
  --font-mono:   'Space Mono', monospace;
  --font-body:   'DM Sans', sans-serif;
  --topbar-h: 64px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; overflow: hidden; }
body {
  background: var(--black);
  color: var(--white);
  font-family: var(--font-body);
  font-size: 13px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--grey); }
code {
  font-family: var(--font-mono); font-size: 11px;
  background: rgba(255,255,255,0.06); padding: 1px 5px;
  border-radius: 3px; color: var(--orange);
}

/* ── App Layout ─────────────────────────────── */
:root { --topbar-h: 80px; }
.app { display: grid; grid-template-rows: var(--topbar-h) 1fr; height: 100vh; overflow: hidden; }
.main-content { display: grid; grid-template-columns: 310px 1fr 350px; overflow: hidden; border-top: 1px solid var(--border); }

/* ── Top Bar ────────────────────────────────── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; gap: 24px; position: relative; z-index: 10;
  background: linear-gradient(180deg, #0a0f1e 0%, var(--black) 100%);
  border-bottom: 1px solid var(--border);
}
.topbar-left { display: flex; flex-direction: column; gap: 4px; min-width: 220px; }
.wordmark { font-family: var(--font-header); font-size: 24px; letter-spacing: 0.08em; color: var(--orange); text-shadow: 0 0 20px rgba(255,77,0,0.4); line-height: 1; }
.mission-name { font-family: var(--font-mono); font-size: 9px; color: var(--grey); letter-spacing: 0.12em; }
.live-clock { font-family: var(--font-mono); font-size: 11px; color: var(--grey); letter-spacing: 0.06em; display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.clock-tz { font-size: 9px; color: var(--grey); opacity: 0.6; margin-right: 4px; letter-spacing: 0.1em; }
.clock-entry { display: flex; align-items: baseline; gap: 2px; }
.clock-sep { opacity: 0.3; }
.topbar-center { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.countdown-display { font-family: var(--font-header); font-size: 38px; letter-spacing: 0.04em; color: var(--white); line-height: 1; text-shadow: 0 0 30px rgba(240,242,248,0.15); transition: color 0.3s; }
.countdown-hold { color: var(--yellow) !important; text-shadow: 0 0 20px rgba(255,179,0,0.4) !important; animation: pulse-yellow 1.5s ease-in-out infinite; }
.countdown-launch { color: var(--orange) !important; text-shadow: 0 0 30px rgba(255,77,0,0.6) !important; animation: pulse-orange 0.8s ease-in-out infinite; }
@keyframes pulse-yellow { 0%,100%{opacity:1}50%{opacity:0.6} }
@keyframes pulse-orange { 0%,100%{opacity:1;text-shadow:0 0 30px rgba(255,77,0,0.8)}50%{opacity:0.85;text-shadow:0 0 60px rgba(255,77,0,1)} }
.countdown-controls { display: flex; gap: 6px; }
.btn-hold, .btn-resume {
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; padding: 4px 12px; border: none; border-radius: 3px;
  cursor: pointer; transition: opacity 0.2s, transform 0.1s;
}
.btn-hold { background: var(--yellow); color: #000; }
.btn-resume { background: var(--green); color: #000; }
.btn-hold:disabled, .btn-resume:disabled { opacity: 0.25; cursor: not-allowed; }
.btn-hold:not(:disabled):hover,.btn-resume:not(:disabled):hover { opacity: 0.85; }
.btn-hold:not(:disabled):active,.btn-resume:not(:disabled):active { transform: scale(0.96); }
.topbar-right { display: flex; align-items: center; justify-content: flex-end; gap: 12px; min-width: 220px; }
.theme-toggle { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; padding: 6px 12px; background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--grey); cursor: pointer; transition: border-color 0.15s, color 0.15s; white-space: nowrap; }
.theme-toggle:hover { border-color: var(--grey); color: var(--white); }
.status-badge { display: flex; align-items: center; gap: 7px; font-family: var(--font-header); font-size: 18px; letter-spacing: 0.1em; padding: 6px 14px; border-radius: 4px; border: 1px solid; }
.status-nominal { color: var(--green); border-color: rgba(0,201,122,0.3); background: rgba(0,201,122,0.06); }
.status-hold    { color: var(--yellow); border-color: rgba(255,179,0,0.4); background: rgba(255,179,0,0.08); }
.status-launch  { color: var(--orange); border-color: rgba(255,77,0,0.5); background: rgba(255,77,0,0.1); animation: pulse-orange 0.8s ease-in-out infinite; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; flex-shrink: 0; }
.hold-banner { position: fixed; top: var(--topbar-h); left: 0; right: 0; height: 28px; background: rgba(255,179,0,0.1); border-bottom: 1px solid rgba(255,179,0,0.45); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--yellow); z-index: 9; animation: pulse-yellow 1.5s ease-in-out infinite; }

/* ── Panel Commons ──────────────────────────── */
.panel-header { display: flex; align-items: baseline; justify-content: space-between; padding: 16px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.panel-title { font-family: var(--font-header); font-size: 16px; letter-spacing: 0.1em; color: var(--white); }
.panel-subtitle { font-family: var(--font-mono); font-size: 9px; color: var(--grey); letter-spacing: 0.08em; }

/* ── Subsystem Grid ─────────────────────────── */
.subsystem-grid { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
.card-list { overflow-y: auto; flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.subsystem-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; cursor: pointer; transition: border-color 0.2s, background 0.2s; user-select: none; }
.subsystem-card:hover { border-color: rgba(240,242,248,0.15); background: #0f1628; }
.card-warning { border-color: rgba(255,179,0,0.4) !important; background: rgba(255,179,0,0.04) !important; animation: border-pulse-yellow 1.5s ease-in-out infinite; }
.card-critical { border-color: rgba(255,45,45,0.5) !important; animation: border-pulse-red 1s ease-in-out infinite; }
@keyframes border-pulse-yellow { 0%,100%{border-color:rgba(255,179,0,0.4)}50%{border-color:rgba(255,179,0,0.85)} }
@keyframes border-pulse-red    { 0%,100%{border-color:rgba(255,45,45,0.5)} 50%{border-color:rgba(255,45,45,1)} }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.card-title-row { display: flex; align-items: center; gap: 7px; }
.status-dot-sm { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.card-label { font-family: var(--font-header); font-size: 13px; letter-spacing: 0.08em; color: var(--white); }
.card-status-text { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; }
.card-metrics { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
.metric-row { display: flex; justify-content: space-between; align-items: baseline; }
.metric-label { font-family: var(--font-mono); font-size: 9px; color: var(--grey); letter-spacing: 0.06em; }
.metric-value { font-family: var(--font-mono); font-size: 12px; color: var(--white); letter-spacing: 0.02em; }
.card-footer { display: flex; align-items: flex-end; justify-content: space-between; margin-top: 4px; }
.sparkline { display: block; opacity: 0.85; }
.expand-hint { font-family: var(--font-mono); font-size: 8px; color: var(--grey); letter-spacing: 0.06em; opacity: 0.6; }

/* ── Checklist ──────────────────────────────── */
.checklist-panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
.checklist-scroll { overflow-y: auto; flex: 1; padding: 14px 18px 24px; }
.checklist-phase { margin-bottom: 28px; }
.phase-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; margin-bottom: 6px; border-bottom: 1px solid var(--border); }
.phase-label { font-family: var(--font-header); font-size: 13px; letter-spacing: 0.12em; color: var(--grey); }
.phase-done .phase-label { color: var(--green); }
.phase-complete-badge { font-family: var(--font-mono); font-size: 8px; color: var(--green); letter-spacing: 0.1em; background: rgba(0,201,122,0.1); padding: 2px 6px; border-radius: 2px; border: 1px solid rgba(0,201,122,0.3); }
.checklist-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 10px; border-radius: 4px; border: 1px solid transparent; margin-bottom: 4px; transition: background 0.2s, border-color 0.2s; }
.item-active { background: rgba(255,77,0,0.06); border-color: rgba(255,77,0,0.3) !important; }
.item-checked { opacity: 0.75; }
.item-pending { opacity: 0.88; }
.item-action  { background: rgba(255,179,0,0.06); border-color: rgba(255,179,0,0.35) !important; animation: border-pulse-yellow 1.5s ease-in-out infinite; }
.item-check { flex-shrink: 0; padding-top: 1px; }
.checkbox { width: 14px; height: 14px; border: 1.5px solid var(--border); border-radius: 3px; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, background 0.2s; }
.checkbox.checked { background: var(--green); border-color: var(--green); }
.checkbox-action { border-color: var(--yellow) !important; box-shadow: 0 0 6px rgba(255,179,0,0.4); }
.checkmark { font-size: 9px; color: #000; font-weight: 700; line-height: 1; }
.item-body { flex: 1; min-width: 0; }
.item-name { font-size: 12px; color: var(--white); display: block; margin-bottom: 3px; }
.item-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.item-role { font-family: var(--font-mono); font-size: 9px; color: var(--orange); letter-spacing: 0.06em; background: rgba(255,77,0,0.1); padding: 1px 5px; border-radius: 2px; }
.item-trigger { font-family: var(--font-mono); font-size: 9px; color: var(--grey); }
.item-type-badge { font-family: var(--font-mono); font-size: 8px; color: var(--yellow); background: rgba(255,179,0,0.08); padding: 1px 4px; border-radius: 2px; border: 1px solid rgba(255,179,0,0.25); }
.item-status { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0; padding-top: 2px; }
.st-complete { color: var(--green); }
.st-pending  { color: var(--grey); }
.st-action   { color: var(--yellow); font-weight: 700; animation: pulse-yellow 1s infinite; }

/* ── AI Companion ───────────────────────────── */
.ai-panel { display: flex; flex-direction: column; overflow: hidden; background: linear-gradient(180deg, #070b18 0%, var(--black) 100%); }
.aria-header-left { display: flex; align-items: center; gap: 8px; }
.aria-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); animation: aria-pulse 2s ease-in-out infinite; flex-shrink: 0; }
@keyframes aria-pulse { 0%,100%{box-shadow:0 0 6px var(--green);opacity:1}50%{box-shadow:0 0 14px var(--green);opacity:0.7} }
.aria-subtitle { font-family: var(--font-mono); font-size: 8px; color: var(--grey); letter-spacing: 0.06em; }
.aria-status-badge { font-family: var(--font-mono); font-size: 9px; color: var(--green); letter-spacing: 0.1em; border: 1px solid rgba(0,201,122,0.35); padding: 2px 7px; border-radius: 10px; background: rgba(0,201,122,0.06); }
.ai-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.message { border-radius: 6px; padding: 12px 14px; border-left: 3px solid; font-size: 12px; line-height: 1.6; }
.msg-sender { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.msg-sender-user { justify-content: flex-end; }
.aria-tag { font-family: var(--font-mono); font-size: 8px; font-weight: 700; color: var(--orange); letter-spacing: 0.1em; }
.user-tag { font-family: var(--font-mono); font-size: 8px; font-weight: 700; color: var(--grey); letter-spacing: 0.1em; }
.msg-time { font-family: var(--font-mono); font-size: 8px; color: var(--grey); opacity: 0.6; }
.msg-text { white-space: pre-wrap; word-break: break-word; }
.msg-system  { border-left-color: var(--grey); background: rgba(138,143,168,0.05); color: var(--grey); }
.msg-info    { border-left-color: rgba(240,242,248,0.25); background: rgba(240,242,248,0.03); color: var(--white); }
.msg-warning { border-left-color: var(--yellow); background: rgba(255,179,0,0.07); color: var(--white); }
.msg-success { border-left-color: var(--green); background: rgba(0,201,122,0.06); color: var(--white); }
.msg-launch  { border-left-color: var(--orange); background: rgba(255,77,0,0.09); color: var(--orange); font-weight: 500; animation: launch-glow 0.6s ease-in-out infinite alternate; }
@keyframes launch-glow { from{box-shadow:inset 0 0 0px rgba(255,77,0,0)} to{box-shadow:inset 0 0 20px rgba(255,77,0,0.05)} }
.msg-user    { border-left-color: transparent; border-right: 3px solid rgba(138,143,168,0.3); background: rgba(138,143,168,0.04); color: var(--grey); text-align: right; }
.msg-response{ border-left-color: rgba(0,201,122,0.4); background: rgba(0,201,122,0.04); color: var(--white); }
.ai-input-area { padding: 14px 16px 18px; border-top: 1px solid var(--border); flex-shrink: 0; }
.ai-input-hint { font-family: var(--font-mono); font-size: 9px; color: var(--grey); margin-bottom: 7px; opacity: 0.7; }
.ai-input-row { display: flex; gap: 6px; }
.ai-input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 7px 10px; font-family: var(--font-mono); font-size: 11px; color: var(--white); outline: none; transition: border-color 0.2s; }
.ai-input::placeholder { color: var(--grey); opacity: 0.5; }
.ai-input:focus { border-color: rgba(255,77,0,0.4); }
.ai-send-btn { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; padding: 7px 14px; background: var(--orange); color: var(--white); border: none; border-radius: 4px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; flex-shrink: 0; }
.ai-send-btn:hover { opacity: 0.85; }
.ai-send-btn:active { transform: scale(0.96); }
/* ── Light Mode ─────────────────────────────── */
[data-theme="light"] {
  --black:  #ECF0FA;
  --white:  #0A0E1C;
  --card:   #FFFFFF;
  --border: #BEC8E8;

}

[data-theme="light"] .ai-input { background: #F2F6FF; }

[data-theme="light"] .msg-system { background: rgba(10,14,28,0.04); }
[data-theme="light"] .msg-user { background: rgba(10,14,28,0.04); }
[data-theme="light"] .msg-response { background: rgba(0,201,122,0.07); }
[data-theme="light"] .msg-warning { background: rgba(255,179,0,0.08); }
[data-theme="light"] .msg-success { background: rgba(0,201,122,0.08); }
[data-theme="light"] .msg-launch { background: rgba(255,77,0,0.07); }
[data-theme="light"] .hold-banner { background: rgba(255,179,0,0.12); }
[data-theme="light"] .item-role { background: rgba(255,77,0,0.08); }
[data-theme="light"] .theme-toggle:hover { color: var(--white); border-color: var(--white); }
[data-theme="light"] .sparkline { opacity: 0.7; }
  </style>
</head>

  { id:16, phase:'FINAL',          name:'Range safety clearance granted',    role:'RSO',     triggerAt:60,  type:'auto'   },

  { id:19, phase:'FINAL',          name:'Final go/no-go confirmation',       role:'FD',      triggerAt:15,  type:'auto'   },

const CHECKLIST_PHASES = ['PRE-LAUNCH','TERMINAL COUNT','FINAL'];

const ARIA_TIMELINE = [
  { id:'msg-930', triggerAt:570, type:'info',
    text:"All subsystems nominal. Propellant loading sequence confirmed complete. Recommend proceeding to terminal count." },
  { id:'msg-700', triggerAt:420, type:'info',
    text:"Range Safety confirm: airspace clear. Wind 8.4 kts from 247°, well within limits. Proceed with avionics arm sequence." },
  { id:'msg-430', triggerAt:270, type:'warning',
    text:"⚠ ANOMALY DETECTED — Avionics bay temp reading 2.3°C above nominal (26.4°C vs baseline 24.1°C). Monitoring trend. No action required yet. I'll alert you if this continues." },
  { id:'msg-300', triggerAt:180, type:'info',

  { id:'msg-100', triggerAt:60,  type:'success',

const SUBSYSTEM_EXPLANATIONS = {
  PROPULSION: "Propulsion monitors oxidizer tank pressure (nominal: 847 PSI), fuel temperature, and chamber pressure. Currently in pre-ignition standby. Propellant loading completed at T-9:50. All values within green band.",
  AVIONICS: "Avionics suite includes primary flight computer, GPS receiver (12 sats locked), and IMU. Bay temperature is the key health indicator — nominal range 22–26°C. CPU load at 23% in pre-launch idle mode.",
  GROUND_SUPPORT: "Ground Support Equipment provides ground-side pressurization and umbilical connections. GSE pressure nominal at 115 PSI. Pad temperature within limits. Umbilical disconnect ready for T-0.",
  RANGE_SAFETY: "Range Safety monitors flight corridor integrity, wind conditions, and exclusion zones. Wind 8.4 kts from 247° — within the 15 kt limit. Visibility 10 miles. Range is CLEAR.",
  POWER: "Power system manages 28V main bus, battery state of charge, and current draw. Battery SOC at 98%. Bus voltage nominal at 28.2V. Current draw 4.7A consistent with pre-launch avionics load.",
  COMMS: "Communications maintains telemetry uplink/downlink with ground station. Signal strength -67 dBm (excellent). Uplink 512 Kbps, downlink 1024 Kbps. No packet loss detected.",
};

/* ════════ HOOKS ════════════════════════════════════════════════════ */

function useCountdown(initial = 600) {
  const [remaining, setRemaining] = useState(initial);
  const [isHolding, setIsHolding]  = useState(false);
  const [isComplete, setIsComplete] = useState(false);
  const holdRef = useRef(false);
  useEffect(() => { holdRef.current = isHolding; }, [isHolding]);
  useEffect(() => {
    const t = setInterval(() => {
      if (holdRef.current) return;
      setRemaining(p => {
        if (p <= 0) { setIsComplete(true); return 0; }
        return p - 1;
      });
    }, 1000);
    return () => clearInterval(t);
  }, []);
  const hold   = useCallback(() => setIsHolding(true),  []);
  const resume = useCallback(() => setIsHolding(false), []);
  return { remaining, isHolding, isComplete, hold, resume };
}

const HISTORY_LEN = 20;

function initTelemetry() {
  const s = {};
  Object.entries(SUBSYSTEM_CONFIG).forEach(([k, cfg]) => {
    const metrics = {}, history = {};
    cfg.metrics.forEach(m => {
      metrics[m.key] = m.base;
      history[m.key] = Array(HISTORY_LEN).fill(m.base);
    });
    s[k] = { status:'nominal', metrics, history };
  });
  return s;
}

function useTelemetry(isHolding) {
  const [telem, setTelem] = useState(initTelemetry);
  const remRef  = useRef(600);
  const holdRef = useRef(false);
  useEffect(() => { holdRef.current = isHolding; }, [isHolding]);

  const updateRemaining = useCallback(r => { remRef.current = r; }, []);

  useEffect(() => {
    const t = setInterval(() => {
      if (holdRef.current) return;
      const rem = remRef.current;
      setTelem(prev => {
        const next = {};
        Object.entries(SUBSYSTEM_CONFIG).forEach(([k, cfg]) => {
          const metrics = {}, history = {};
          cfg.metrics.forEach(m => {
            let base = m.base;
            if (k === 'AVIONICS' && m.key === 'bayTemp' && rem <= 270 && rem > 120) base += 2.3;
            const val = parseFloat((base + (Math.random()-0.5)*m.variance*2).toFixed(m.dec));
            metrics[m.key] = val;
            history[m.key] = [...prev[k].history[m.key].slice(1), val];
          });
          let status = 'nominal';
          if (k === 'AVIONICS' && rem <= 270 && rem > 120) status = 'warning';
          next[k] = { status, metrics, history };
        });
        return next;
      });
    }, 2000);
    return () => clearInterval(t);
  }, []);

  return { telem, updateRemaining };
}

/* ════════ COMPONENTS ══════════════════════════════════════════════ */

/* ── Sparkline ──────────────────────────────────────────────────── */
function Sparkline({ data, color, w = 88, h = 28 }) {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 0.001;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return (
    <svg width={w} height={h} className="sparkline">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5"
        strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

/* ── Subsystem Card ─────────────────────────────────────────────── */
const STATUS_COLOR = { nominal:'var(--green)', warning:'var(--yellow)', critical:'var(--red)' };

function SubsystemCard({ id, data }) {
  const [expanded, setExpanded] = useState(false);
  const cfg = SUBSYSTEM_CONFIG[id];
  if (!cfg || !data) return null;
  const { status, metrics, history } = data;
  const dotColor = STATUS_COLOR[status] || 'var(--green)';
  const displayMetrics = expanded ? cfg.metrics : cfg.metrics.slice(0, 2);

  return (
    <div
      className={`subsystem-card ${status !== 'nominal' ? `card-${status}` : ''}`}
      onClick={() => setExpanded(e => !e)}
      role="button" tabIndex={0}
      onKeyDown={e => e.key === 'Enter' && setExpanded(v => !v)}
    >
      <div className="card-header">
        <div className="card-title-row">
          <span className="status-dot-sm" style={{ background: dotColor, boxShadow: `0 0 6px ${dotColor}` }} />
          <span className="card-label">{cfg.label}</span>
        </div>
        <span className="card-status-text" style={{ color: dotColor }}>{status.toUpperCase()}</span>
      </div>
      <div className="card-metrics">
        {displayMetrics.map(m => (
          <div key={m.key} className="metric-row">
            <span className="metric-label">{m.label}</span>
            <span className="metric-value" style={{ color: m.key === cfg.primaryMetric && status !== 'nominal' ? dotColor : 'var(--white)' }}>
              {metrics[m.key]}{m.unit}
            </span>
          </div>
        ))}
      </div>
      <div className="card-footer">
        <Sparkline data={history[cfg.primaryMetric]} color={dotColor} />
        <span className="expand-hint">{expanded ? '▲ LESS' : '▼ MORE'}</span>
      </div>
    </div>
  );
}

/* ── Subsystem Grid ─────────────────────────────────────────────── */
function SubsystemGrid({ telem }) {

    <aside className="subsystem-grid">
      <div className="panel-header">
        <span className="panel-title">SUBSYSTEM STATUS</span>
        <span className="panel-subtitle">6 SYSTEMS</span>
      </div>
      <div className="card-list">

/* ── Checklist ──────────────────────────────────────────────────── */
function fmtTrig(s) {
  return `T-${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function Checklist({ remaining, isHolding }) {
  const [manualChecked, setManualChecked] = useState(new Set());
  const activeRef = useRef(null);

  const isChecked = item => {
    if (remaining <= item.triggerAt) {
      return item.type === 'auto' || manualChecked.has(item.id);
    }
    return false;
  };
  const isActionReq = item => item.type === 'manual' && remaining <= item.triggerAt && !manualChecked.has(item.id);
  const isPending   = item => remaining > item.triggerAt;

  const activeId = (() => {
    const ar = CHECKLIST_ITEMS.find(isActionReq);
    if (ar) return ar.id;
    const done = [...CHECKLIST_ITEMS].reverse().find(i => !isPending(i) && isChecked(i));
    return done ? done.id : null;
  })();

  useEffect(() => {
    activeRef.current?.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, [activeId]);

  const toggle = item => {
    if (item.type !== 'manual' || isHolding) return;
    setManualChecked(prev => {
      const n = new Set(prev);
      n.has(item.id) ? n.delete(item.id) : n.add(item.id);
      return n;
    });
  };

  const totalDone = CHECKLIST_ITEMS.filter(isChecked).length;

  return (
    <section className="checklist-panel">
      <div className="panel-header">
        <span className="panel-title">COUNTDOWN CHECKLIST</span>
        <span className="panel-subtitle">{totalDone} / {CHECKLIST_ITEMS.length} COMPLETE</span>
      </div>
      <div className="checklist-scroll">
        {CHECKLIST_PHASES.map(phase => {
          const items = CHECKLIST_ITEMS.filter(i => i.phase === phase);
          const allDone = items.every(isChecked);
          return (
            <div key={phase} className="checklist-phase">
              <div className={`phase-header ${allDone ? 'phase-done' : ''}`}>
                <span className="phase-label">{phase}</span>
                {allDone && <span className="phase-complete-badge">COMPLETE</span>}
              </div>
              {items.map(item => {
                const checked   = isChecked(item);
                const pending   = isPending(item);
                const actionReq = isActionReq(item);
                const isActive  = item.id === activeId;
                let stText = 'PENDING', stClass = 'st-pending';
                if (checked)   { stText = 'COMPLETE'; stClass = 'st-complete'; }
                if (actionReq) { stText = 'ACTION REQUIRED'; stClass = 'st-action'; }

                return (
                  <div key={item.id}
                    ref={isActive ? activeRef : null}
                    className={[
                      'checklist-item',
                      isActive  ? 'item-active'  : '',
                      checked   ? 'item-checked' : '',
                      pending   ? 'item-pending' : '',
                      actionReq ? 'item-action'  : '',
                    ].join(' ')}
                    onClick={() => toggle(item)}
                    style={{ cursor: item.type === 'manual' && !checked ? 'pointer' : 'default' }}
                  >
                    <div className="item-check">
                      <div className={`checkbox ${checked ? 'checked' : ''} ${actionReq ? 'checkbox-action' : ''}`}>
                        {checked && <span className="checkmark">✓</span>}
                      </div>
                    </div>
                    <div className="item-body">
                      <span className="item-name">{item.name}</span>
                      <div className="item-meta">
                        <span className="item-role">{item.role}</span>
                        <span className="item-trigger">{fmtTrig(item.triggerAt)}</span>
                        {item.type === 'manual' && <span className="item-type-badge">MANUAL</span>}
                      </div>
                    </div>
                    <div className={`item-status ${stClass}`}>{stText}</div>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </section>
  );
}

/* ── AI Companion ───────────────────────────────────────────────── */
function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function genStatus(telem) {
  const lines = Object.entries(SUBSYSTEM_CONFIG).map(([k, cfg]) => {
    const sub = telem[k];
    if (!sub) return '';
    const primary = cfg.metrics[0];
    const val = sub.metrics[primary.key];
    const s = sub.status.toUpperCase();
    return `  ${cfg.label.padEnd(16)} ${s.padEnd(8)} ${primary.label}: ${val}${primary.unit}`;
  });
  return `SYSTEM STATUS REPORT\n${lines.join('\n')}\n\nAll links nominal. Telemetry streaming at 2s cadence.`;
}

function genExplain(subsystem, telem) {
  const key = Object.keys(SUBSYSTEM_CONFIG).find(k =>
    k.toLowerCase().includes(subsystem) || SUBSYSTEM_CONFIG[k].label.toLowerCase().includes(subsystem)
  );
  if (!key) return `Unknown subsystem "${subsystem}". Try: propulsion, avionics, ground support, range safety, power, comms.`;
  const expl = SUBSYSTEM_EXPLANATIONS[key];
  const sub  = telem?.[key];
  if (!sub) return expl;
  const mlines = SUBSYSTEM_CONFIG[key].metrics.map(m => `  ${m.label}: ${sub.metrics[m.key]}${m.unit}`).join('\n');
  return `${expl}\n\nCURRENT READINGS:\n${mlines}`;
}

const MSG_CLASS = {
  system:'msg-system', info:'msg-info', warning:'msg-warning',
  success:'msg-success', launch:'msg-launch', user:'msg-user', response:'msg-response',
};

function AICompanion({ messages, telem, isHolding }) {
  const [input, setInput]           = useState('');
  const [localMsgs, setLocalMsgs]   = useState([]);
  const bottomRef = useRef(null);
  const allMsgs = [...messages, ...localMsgs].sort((a,b) => a.timestamp - b.timestamp);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior:'smooth' });
  }, [allMsgs.length]);

  const send = () => {
    const raw = input.trim(); if (!raw) return;
    setInput('');
    const q = raw.toLowerCase();
    let resp;
    if (q === 'status') {
      resp = genStatus(telem);
    } else if (q === 'hold') {
      resp = isHolding
        ? 'COUNT HOLD is currently active. All systems in standby. Propellants stable. Awaiting RESUME command from Flight Director. No system degradation detected during hold.'
        : 'No active hold conditions. Count proceeding nominally. All constraints satisfied.';
    } else if (q.startsWith('explain ')) {
      resp = genExplain(q.replace('explain ','').trim(), telem);
    } else if (q === 'abort') {
      resp = 'ABORT command noted. In a live operation this would initiate safe shutdown. For this simulation, use the HOLD button on the main console.';
    } else {
      resp = "Monitoring all systems. No action required. Type 'status' for a full report, 'hold' for hold status, or 'explain [subsystem]' for detail.";
    }
    const now = Date.now();
    setLocalMsgs(prev => [...prev,
      { id:`u${now}`, text:raw, type:'user', timestamp:now },
      { id:`a${now}`, text:resp, type:'response', timestamp:now+1 },
    ]);
  };

  return (
    <aside className="ai-panel">
      <div className="panel-header">
        <div className="aria-header-left">
          <span className="aria-indicator" />
          <span className="panel-title">ARIA</span>
          <span className="aria-subtitle">Autonomous Range Intelligence Assistant</span>
        </div>
        <span className="aria-status-badge">ONLINE</span>
      </div>

      <div className="ai-messages">
        {allMsgs.map(msg => (
          <div key={msg.id} className={`message ${MSG_CLASS[msg.type] || 'msg-info'}`}>
            {msg.type === 'user' ? (
              <div className="msg-sender msg-sender-user">
                <span className="user-tag">YOU</span>
                <span className="msg-time">{fmtTime(msg.timestamp)}</span>
              </div>
            ) : (
              <div className="msg-sender">
                <span className="aria-tag">ARIA</span>
                <span className="msg-time">{fmtTime(msg.timestamp)}</span>
              </div>
            )}
            <div className="msg-text">{msg.text}</div>
          </div>
        ))}
        <div ref={bottomRef} />
      </div>

      <div className="ai-input-area">
        <div className="ai-input-hint">
          Try: <code>status</code> · <code>hold</code> · <code>explain avionics</code>
        </div>
        <div className="ai-input-row">
          <input
            className="ai-input"
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
            placeholder="Ask ARIA anything..."
            maxLength={200}
          />
          <button className="ai-send-btn" onClick={send}>SEND</button>
        </div>
      </div>
    </aside>
  );
}

/* ── Top Bar ────────────────────────────────────────────────────── */
function fmtCountdown(s) {
  if (s <= 0) return 'T+00:00';
  return `T-${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function TopBar({ remaining, isHolding, isComplete, onHold, onResume, theme, onToggleTheme }) {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  const status = isComplete ? 'LAUNCH' : isHolding ? 'HOLD' : 'NOMINAL';
  const statusClass = isComplete ? 'status-launch' : isHolding ? 'status-hold' : 'status-nominal';
  const cdClass = isComplete ? 'countdown-launch' : isHolding ? 'countdown-hold' : '';

  return (
    <header className="topbar">
      <div className="topbar-left">
        <span className="wordmark">LAUNCH OPS AI</span>
        <span className="mission-name">APEX-7 · STUDENT LAUNCH INITIATIVE</span>
      </div>
      <div className="topbar-center">
        <div className={`countdown-display ${cdClass}`}>
          {isComplete ? 'LAUNCH' : fmtCountdown(remaining)}
        </div>
        <div className="countdown-controls">
          <button className="btn-hold"   onClick={onHold}   disabled={isHolding || isComplete}>HOLD</button>
          <button className="btn-resume" onClick={onResume} disabled={!isHolding || isComplete}>RESUME</button>
        </div>
        <div className="live-clock">
          <span className="clock-entry"><span className="clock-tz">{Intl.DateTimeFormat().resolvedOptions().timeZone}</span> {now.toLocaleTimeString('en-US',{hour12:false})}</span>
          <span className="clock-sep">·</span>
          <span className="clock-entry"><span className="clock-tz">UTC</span> {now.toLocaleTimeString('en-US',{hour12:false,timeZone:'UTC'})}</span>
        </div>
      </div>
      <div className="topbar-right">
        <button className="theme-toggle" onClick={onToggleTheme}>
          {theme === 'dark' ? '☀ LIGHT' : '☾ DARK'}
        </button>
        <div className={`status-badge ${statusClass}`}>
          <span className="status-dot" />
          {status}
        </div>
      </div>
      {isHolding && <div className="hold-banner">⏸ COUNT HOLD — AWAITING RESUME</div>}
    </header>
  );
}

/* ════════ APP ROOT ════════════════════════════════════════════════ */

const WELCOME = {
  id:'aria-welcome',
  text:'ARIA online. Mission APEX-7 countdown sequence active. T-10:00 and counting. Monitoring all subsystems. Standing by.',
  type:'system',
  timestamp: Date.now(),
};

function App() {
  const { remaining, isHolding, isComplete, hold, resume } = useCountdown(600);
  const { telem, updateRemaining } = useTelemetry(isHolding);
  const [ariaMsgs, setAriaMsgs]   = useState([WELCOME]);
  const [triggered, setTriggered] = useState(new Set());
  const [theme, setTheme]         = useState('dark');

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  const toggleTheme = useCallback(() => setTheme(t => t === 'dark' ? 'light' : 'dark'), []);

  useEffect(() => { updateRemaining(remaining); }, [remaining]);

  useEffect(() => {
    if (isHolding) return;
    ARIA_TIMELINE.forEach(msg => {
      if (remaining <= msg.triggerAt && !triggered.has(msg.id)) {
        setTriggered(prev => new Set([...prev, msg.id]));
        setAriaMsgs(prev => [...prev, { ...msg, timestamp: Date.now() }]);
      }
    });
  }, [remaining, isHolding]);

  return (
    <div className="app">
      <TopBar remaining={remaining} isHolding={isHolding} isComplete={isComplete} onHold={hold} onResume={resume} theme={theme} onToggleTheme={toggleTheme} />
      <main className="main-content">
        <SubsystemGrid telem={telem} />
        <Checklist remaining={remaining} isHolding={isHolding} />
        <AICompanion messages={ariaMsgs} telem={telem} isHolding={isHolding} remaining={remaining} />
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
